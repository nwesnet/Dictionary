spring.application.name=DictionaryApp

# MySQL database configure
spring.datasource.url=jdbc:mysql://localhost:3306/dictionarydb
spring.datasource.username=dictionary
spring.datasource.password=StrongDictPass123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server port
server.port=1337